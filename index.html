
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Zaldy L. Bernabe | Senior Commissioning Engineer</title>
<style>
  * {
    margin: 0;
    padding: 0;
    box-sizing: border-box;
  }

  :root {
    --primary: #0a2540;
    --accent: #00d4a0;
    --accent2: #0077ff;
    --dark: #0d1117;
    --light: #f6f9fc;
    --gray: #6b7280;
    --card: #ffffff;
  }

  body {
    font-family: 'Segoe UI', 'Inter', -apple-system, sans-serif;
    background: var(--light);
    color: var(--primary);
    line-height: 1.7;
    scroll-behavior: smooth;
  }

  /* Navbar */
  nav {
    position: fixed;
    top: 0;
    width: 100%;
    background: rgba(13, 17, 23, 0.95);
    backdrop-filter: blur(10px);
    z-index: 1000;
    padding: 1rem 2rem;
    display: flex;
    justify-content: space-between;
    align-items: center;
    box-shadow: 0 2px 20px rgba(0,0,0,0.1);
  }

  nav .logo {
    color: #fff;
    font-weight: 800;
    font-size: 1.2rem;
    letter-spacing: 1px;
  }
  nav .logo span { color: var(--accent); }

  nav ul {
    display: flex;
    list-style: none;
    gap: 1.8rem;
  }

  nav ul li a {
    color: #cbd5e1;
    text-decoration: none;
    font-size: 0.9rem;
    font-weight: 500;
    transition: color 0.3s;
  }
  nav ul li a:hover { color: var(--accent); }

  /* Hero */
  .hero {
    background: linear-gradient(135deg, #0a2540 0%, #0d1117 60%, #003d66 100%);
    color: #fff;
    padding: 9rem 2rem 5rem;
    text-align: center;
    position: relative;
    overflow: hidden;
  }

  .hero::before {
    content: "";
    position: absolute;
    top: -50%;
    right: -20%;
    width: 500px;
    height: 500px;
    background: radial-gradient(circle, rgba(0,212,160,0.25), transparent 70%);
    border-radius: 50%;
  }
  .hero::after {
    content: "";
    position: absolute;
    bottom: -30%;
    left: -10%;
    width: 400px;
    height: 400px;
    background: radial-gradient(circle, rgba(0,119,255,0.2), transparent 70%);
    border-radius: 50%;
  }

  .hero-content { position: relative; z-index: 2; max-width: 900px; margin: 0 auto; }

  .avatar {
    width: 130px;
    height: 130px;
    border-radius: 50%;
    background: linear-gradient(135deg, var(--accent), var(--accent2));
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 3rem;
    font-weight: 800;
    margin: 0 auto 1.5rem;
    box-shadow: 0 10px 40px rgba(0,212,160,0.4);
    border: 4px solid rgba(255,255,255,0.1);
  }

  .hero h1 {
    font-size: 2.8rem;
    font-weight: 800;
    margin-bottom: 0.5rem;
  }
  .hero h1 span { color: var(--accent); }

  .hero .tagline {
    font-size: 1.2rem;
    color: var(--accent);
    font-weight: 600;
    margin-bottom: 1rem;
  }

  .badges {
    display: flex;
    flex-wrap: wrap;
    justify-content: center;
    gap: 0.6rem;
    margin: 1.5rem 0;
  }
  .badge {
    background: rgba(255,255,255,0.08);
    border: 1px solid rgba(0,212,160,0.4);
    color: #e2e8f0;
    padding: 0.4rem 1rem;
    border-radius: 30px;
    font-size: 0.82rem;
    font-weight: 500;
  }

  .contact-bar {
    display: flex;
    flex-wrap: wrap;
    justify-content: center;
    gap: 1.2rem;
    margin-top: 1.5rem;
    font-size: 0.9rem;
    color: #cbd5e1;
  }
  .contact-bar a { color: var(--accent); text-decoration: none; }
  .contact-bar a:hover { text-decoration: underline; }

  .cta-buttons {
    margin-top: 2rem;
    display: flex;
    gap: 1rem;
    justify-content: center;
    flex-wrap: wrap;
  }
  .btn {
    padding: 0.85rem 2rem;
    border-radius: 30px;
    font-weight: 600;
    text-decoration: none;
    transition: transform 0.3s, box-shadow 0.3s;
    font-size: 0.95rem;
  }
  .btn-primary {
    background: linear-gradient(135deg, var(--accent), var(--accent2));
    color: #fff;
    box-shadow: 0 8px 25px rgba(0,212,160,0.4);
  }
  .btn-outline {
    background: transparent;
    color: #fff;
    border: 2px solid var(--accent);
  }
  .btn:hover { transform: translateY(-3px); box-shadow: 0 12px 30px rgba(0,212,160,0.5); }

  /* Stats */
  .stats {
    display: flex;
    flex-wrap: wrap;
    justify-content: center;
    gap: 2rem;
    background: var(--dark);
    padding: 2.5rem 2rem;
    color: #fff;
  }
  .stat { text-align: center; min-width: 140px; }
  .stat .num {
    font-size: 2.5rem;
    font-weight: 800;
    background: linear-gradient(135deg, var(--accent), var(--accent2));
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
  }
  .stat .label { color: #94a3b8; font-size: 0.85rem; text-transform: uppercase; letter-spacing: 1px; }

  /* Sections */
  section.content {
    max-width: 1000px;
    margin: 0 auto;
    padding: 4rem 2rem;
  }

  .section-title {
    font-size: 2rem;
    font-weight: 800;
    text-align: center;
    margin-bottom: 0.5rem;
    position: relative;
  }
  .section-title::after {
    content: "";
    display: block;
    width: 60px;
    height: 4px;
    background: linear-gradient(135deg, var(--accent), var(--accent2));
    margin: 0.8rem auto 2.5rem;
    border-radius: 2px;
  }

  .summary-text {
    font-size: 1.05rem;
    color: #334155;
    text-align: center;
    max-width: 850px;
    margin: 0 auto;
  }

  /* Skills */
  .skills-grid {
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
    gap: 1.5rem;
  }
  .skill-card {
    background: var(--card);
    border-radius: 16px;
    padding: 1.8rem;
    box-shadow: 0 4px 20px rgba(0,0,0,0.06);
    border-top: 4px solid var(--accent);
    transition: transform 0.3s, box-shadow 0.3s;
  }
  .skill-card:hover { transform: translateY(-6px); box-shadow: 0 12px 30px rgba(0,0,0,0.12); }
  .skill-card h3 { font-size: 1.1rem; margin-bottom: 0.8rem; color: var(--primary); }
  .skill-card p { color: var(--gray); font-size: 0.9rem; }
  .skill-icon { font-size: 1.8rem; margin-bottom: 0.5rem; }

  /* Timeline */
  .timeline {
    position: relative;
    max-width: 800px;
    margin: 0 auto;
  }
  .timeline::before {
    content: "";
    position: absolute;
    left: 20px;
    top: 0;
    bottom: 0;
    width: 3px;
    background: linear-gradient(var(--accent), var(--accent2));
  }
  .timeline-item {
    position: relative;
    padding-left: 60px;
    margin-bottom: 2.5rem;
  }
  .timeline-item::before {
    content: "";
    position: absolute;
    left: 12px;
    top: 5px;
    width: 18px;
    height: 18px;
    border-radius: 50%;
    background: var(--accent);
    border: 4px solid var(--light);
    box-shadow: 0 0 0 3px var(--accent);
  }
  .timeline-item h3 { font-size: 1.2rem; color: var(--primary); }
  .timeline-item .company { color: var(--accent2); font-weight: 600; font-size: 0.95rem; }
  .timeline-item .period {
    display: inline-block;
    background: var(--primary);
    color: #fff;
    padding: 0.2rem 0.8rem;
    border-radius: 20px;
    font-size: 0.78rem;
    margin: 0.4rem 0 0.8rem;
  }
  .timeline-item ul { padding-left: 1.2rem; color: #475569; font-size: 0.92rem; }
  .timeline-item ul li { margin-bottom: 0.4rem; }

  /* Achievements */
  .achievements-section { background: var(--dark); color: #fff; }
  .achievements-section .section-title { color: #fff; }
  .achieve-grid {
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
    gap: 1.2rem;
  }
  .achieve-card {
    background: rgba(255,255,255,0.05);
    border-left: 4px solid var(--accent);
    padding: 1.3rem;
    border-radius: 10px;
    font-size: 0.92rem;
    color: #cbd5e1;
    transition: background 0.3s;
  }
  .achieve-card:hover { background: rgba(0,212,160,0.1); }

  /* Education & Memberships */
  .two-col {
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(300px, 1fr));
    gap: 2rem;
  }
  .info-card {
    background: var(--card);
    border-radius: 16px;
    padding: 2rem;
    box-shadow: 0 4px 20px rgba(0,0,0,0.06);
  }
  .info-card h3 { margin-bottom: 1rem; color: var(--accent2); }
  .info-card ul { list-style: none; }
  .info-card ul li {
    padding: 0.6rem 0;
    border-bottom: 1px solid #eef2f7;
    font-size: 0.92rem;
    color: #334155;
  }
  .info-card ul li:last-child { border: none; }
  .info-card ul li::before { content: "▹ "; color: var(--accent); font-weight: 800; }

  /* Footer */
  footer {
    background: var(--primary);
    color: #cbd5e1;
    text-align: center;
    padding: 3rem 2rem;
  }
