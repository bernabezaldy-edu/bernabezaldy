
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Zaldy L. Bernabe | Senior Commissioning Engineer</title>
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;600;700&family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet">
<style>
  *{margin:0;padding:0;box-sizing:border-box}
  :root{
    --bg:#05060a; --bg2:#0b0e17; --card:rgba(255,255,255,0.04);
    --accent:#00ffc2; --accent2:#3b82f6; --purple:#a855f7;
    --text:#e2e8f0; --muted:#94a3b8; --border:rgba(255,255,255,0.08);
  }
  html{scroll-behavior:smooth}
  body{
    font-family:'Inter',sans-serif; background:var(--bg); color:var(--text);
    overflow-x:hidden; line-height:1.7;
  }
  h1,h2,h3,.font-head{font-family:'Space Grotesk',sans-serif}

  /* Animated gradient background */
  .bg-orbs{position:fixed;inset:0;z-index:-2;overflow:hidden}
  .orb{position:absolute;border-radius:50%;filter:blur(90px);opacity:.5;animation:float 18s infinite ease-in-out}
  .orb1{width:500px;height:500px;background:var(--accent);top:-150px;right:-100px}
  .orb2{width:450px;height:450px;background:var(--accent2);bottom:-100px;left:-100px;animation-delay:-6s}
  .orb3{width:350px;height:350px;background:var(--purple);top:40%;left:50%;animation-delay:-12s}
  @keyframes float{0%,100%{transform:translate(0,0) scale(1)}33%{transform:translate(60px,-40px) scale(1.1)}66%{transform:translate(-40px,60px) scale(.95)}}
  .grid-overlay{position:fixed;inset:0;z-index:-1;background-image:linear-gradient(var(--border) 1px,transparent 1px),linear-gradient(90deg,var(--border) 1px,transparent 1px);background-size:60px 60px;opacity:.4;mask-image:radial-gradient(ellipse at center,black,transparent 75%)}

  /* Navbar */
  nav{position:fixed;top:0;width:100%;z-index:1000;padding:1.1rem 2rem;display:flex;justify-content:space-between;align-items:center;background:rgba(5,6,10,.6);backdrop-filter:blur(16px);border-bottom:1px solid var(--border);transition:.3s}
  nav .logo{font-family:'Space Grotesk';font-weight:700;font-size:1.15rem;letter-spacing:1px}
  nav .logo b{background:linear-gradient(135deg,var(--accent),var(--accent2));-webkit-background-clip:text;-webkit-text-fill-color:transparent}
  nav ul{display:flex;gap:2rem;list-style:none}
  nav ul a{color:var(--muted);text-decoration:none;font-size:.88rem;font-weight:500;transition:.3s;position:relative}
  nav ul a::after{content:"";position:absolute;left:0;bottom:-4px;width:0;height:2px;background:var(--accent);transition:.3s}
  nav ul a:hover{color:#fff}nav ul a:hover::after{width:100%}
  .menu-btn{display:none;background:none;border:none;color:#fff;font-size:1.5rem;cursor:pointer}
  @media(max-width:768px){nav ul{display:none}.menu-btn{display:block}}

  /* Hero */
  .hero{min-height:100vh;display:flex;flex-direction:column;align-items:center;justify-content:center;text-align:center;padding:8rem 1.5rem 4rem;position:relative}
  .status-pill{display:inline-flex;align-items:center;gap:.5rem;background:var(--card);border:1px solid var(--border);padding:.5rem 1.2rem;border-radius:50px;font-size:.82rem;color:var(--muted);margin-bottom:1.8rem;backdrop-filter:blur(10px);animation:fadeUp .8s ease}
  .status-pill .dot{width:8px;height:8px;border-radius:50%;background:var(--accent);box-shadow:0 0 12px var(--accent);animation:pulse 2s infinite}
  @keyframes pulse{50%{opacity:.4}}
  .avatar{width:120px;height:120px;border-radius:50%;background:linear-gradient(135deg,var(--accent),var(--accent2),var(--purple));display:flex;align-items:center;justify-content:center;font-family:'Space Grotesk';font-size:2.6rem;font-weight:700;color:#05060a;margin-bottom:1.5rem;box-shadow:0 0 50px rgba(0,255,194,.4);animation:fadeUp .8s ease,glow 3s infinite alternate}
  @keyframes glow{to{box-shadow:0 0 70px rgba(59,130,246,.5)}}
  .hero h1{font-size:clamp(2.2rem,6vw,4rem);font-weight:700;line-height:1.1;margin-bottom:.6rem;animation:fadeUp .8s ease .1s both}
  .hero h1 .grad{background:linear-gradient(135deg,var(--accent),var(--accent2));-webkit-background-clip:text;-webkit-text-fill-color:transparent}
  .hero .role{font-size:clamp(1rem,2.5vw,1.4rem);color:var(--accent);font-weight:600;margin-bottom:.4rem;font-family:'Space Grotesk';animation:fadeUp .8s ease .2s both}
  .hero .sub{color:var(--muted);max-width:600px;font-size:.95rem;margin-bottom:1.6rem;animation:fadeUp .8s ease .3s both}
  @keyframes fadeUp{from{opacity:0;transform:translateY(30px)}to{opacity:1;transform:translateY(0)}}
  .badges{display:flex;flex-wrap:wrap;justify-content:center;gap:.6rem;margin-bottom:2rem;animation:fadeUp .8s ease .4s both}
  .badge{background:var(--card);border:1px solid var(--border);color:var(--text);padding:.45rem 1rem;border-radius:50px;font-size:.8rem;font-weight:500;backdrop-filter:blur(10px);transition:.3s}
  .badge:hover{border-color:var(--accent);color:var(--accent);transform:translateY(-2px)}
  .cta{display:flex;gap:1rem;flex-wrap:wrap;justify-content:center;animation:fadeUp .8s ease .5s both}
  .btn{padding:.9rem 2rem;border-radius:50px;font-weight:600;text-decoration:none;font-size:.92rem;transition:.3s;display:inline-flex;align-items:center;gap:.5rem;cursor:pointer;border:none}
  .btn-primary{background:linear-gradient(135deg,var(--accent),var(--accent2));color:#05060a;box-shadow:0 10px 30px rgba(0,255,194,.3)}
  .btn-primary:hover{transform:translateY(-3px);box-shadow:0 15px 40px rgba(0,255,194,.5)}
  .btn-ghost{background:var(--card);color:#fff;border:1px solid var(--border);backdrop-filter:blur(10px)}
  .btn-ghost:hover{border-color:var(--accent);transform:translateY(-3px)}
  .scroll-hint{position:absolute;bottom:2rem;left:50%;transform:translateX(-50%);color:var(--muted);font-size:.75rem;letter-spacing:2px;text-transform:uppercase;animation:bounce 2s infinite}
  @keyframes bounce{50%{transform:translate(-50%,-8px)}}

  /* Stats */
  .stats{display:flex;flex-wrap:wrap;justify-content:center;gap:1rem;max-width:1000px;margin:-2rem auto 0;padding:0 1.5rem;position:relative;z-index:5}
  .stat{flex:1;min-width:150px;background:var(--card);border:1px solid var(--border);border-radius:18px;padding:1.6rem 1rem;text-align:center;backdrop-filter:blur(16px);transition:.3s}
  .stat:hover{transform:translateY(-6px);border-color:var(--accent)}
  .stat .num{font-family:'Space Grotesk';font-size:2.4rem;font-weight:700;background:linear-gradient(135deg,var(--accent),var(--accent2));-webkit-background-clip:text;-webkit-text-fill-color:transparent}
  .stat .lbl{color:var(--muted);font-size:.78rem;text-transform:uppercase;letter-spacing:1px;margin-top:.3rem}

  /* Sections */
  section{max-width:1100px;margin:0 auto;padding:5rem 1.5rem;position:relative}
  .eyebrow{color:var(--accent);font-size:.8rem;font-weight:600;text-transform:uppercase;letter-spacing:3px;text-align:center;margin-bottom:.6rem}
  .sec-title{font-size:clamp(1.8rem,4vw,2.6rem);font-weight:700;text-align:center;margin-bottom:3rem}
  .reveal{opacity:0;transform:translateY(40px);transition:.8s cubic-bezier(.2,.8,.2,1)}
  .reveal.show{opacity:1;transform:none}

  .summary{max-width:820px;margin:0 auto;text-align:center;font-size:1.08rem;color:var(--muted)}
  .summary b{color:#fff}

  /* Skills */
  .skills{display:grid;grid-template-columns:repeat(auto-fit,minmax(280px,1fr));gap:1.4rem}
  .skill{background:var(--card);border:1px solid var(--border);border-radius:20px;padding:1.8rem;backdrop-filter:blur(16px);transition:.4s;position:relative;overflow:hidden}
  .skill::before{content:"";position:absolute;top:0;left:0;width:100%;height:3px;background:linear-gradient(90deg,var(--accent),var(--accent2));transform:scaleX(0);transform-origin:left;transition:.4s}
  .skill:hover{transform:translateY(-8px);border-color:var(--border)}
  .skill:hover::before{transform:scaleX(1)}
  .skill .ic{font-size:2rem;margin-bottom:.8rem}
  .skill h3{font-size:1.05rem;margin-bottom:.6rem}
  .skill p{color:var(--muted);font-size:.88rem}

  /* Timeline */
  .timeline{position:relative;max-width:850px;margin:0 auto;padding-left:1rem}
  .timeline::before{content:"";position:absolute;left:8px;top:0;bottom:0;width:2px;background:linear-gradient(var(--accent),var(--accent2),var(--purple))}
  .titem{position:rel
