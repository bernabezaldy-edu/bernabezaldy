        /* ADD THIS FOR THE FOOTER */
        .footer {
            background: var(--bg2);
            padding: 4rem 1.5rem;
            border-top: 1px solid var(--border);
            text-align: center;
        }
        .footer-content { max-width: 800px; margin: 0 auto; }
        .footer-links { display: flex; justify-content: center; gap: 2rem; margin: 2rem 0; }
        .footer-links a { color: var(--muted); text-decoration: none; transition: .3s; }
        .footer-links a:hover { color: var(--accent); }
        .copyright { color: var(--muted); font-size: 0.8rem; }
    </style>
</head>
<body>
    <!-- [Keep your existing Hero, Skills, and Timeline sections] -->
    
    <!-- ADD THIS FOOTER SECTION -->
    <footer class="footer">
        <div class="footer-content">
            <h2 class="font-head" style="margin-bottom: 1rem;">Let's work together.</h2>
            <p style="color: var(--muted); margin-bottom: 2rem;">Ready to bring precision and efficiency to your next project? Reach out.</p>

            <div class="footer-links">

                <a href="#">Portfolio</a>
            </div>
            <p class="copyright">© 2026 Zaldy L. Bernabe. All rights reserved.</p>
        </div>
    </footer>

    <script>
        // Simple Intersection Observer to reveal elements
        const observer = new IntersectionObserver((entries) => {
            entries.forEach(entry => { if(entry.isIntersecting) entry.target.classList.add('show'); });
        });
        document.querySelectorAll('.reveal').forEach(el => observer.observe(el));
    </script>
</body>
